name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: |
        docker build -t jewellery-pos-app:latest .
        docker save jewellery-pos-app:latest > jewellery-pos-app.tar

    - name: Copy Docker Image to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "jewellery-pos-app.tar"
        target: "~/"
        rm: false

    - name: Load and Restart Docker Container
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          docker load < ~/jewellery-pos-app.tar
          docker stop jewellery-pos-container || true
          docker rm jewellery-pos-container || true
          docker run -d -p 9999:80 -v ~/jewellery-pos-uploads:/app/server/dist/uploads --name jewellery-pos-container --network rxsheba_app-network -e DATABASE_URL="postgresql://rxsheba143:*rian*iloveu*shefa%23@postgres:5432/jewellery_pos" -e JWT_SECRET="s8d9f7g6h5j4k3l2m1n0b9v8c7x6z5a4q3w2e1r0t9y8u7i6o5p4" -e SUPERADMIN_PASSWORD="*Rian*Secure*Super*Admin*143#" --restart always jewellery-pos-app:latest
          docker system prune -f
          rm ~/jewellery-pos-app.tar || true
          docker exec rxsheba_nginx_1 nginx -s reload || true
